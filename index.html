<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clothing Brand</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- NAVBAR -->
    <header>
        <h1 class="logo">MARCWEAR</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#products">Shop</a>
            <a href="#cart">Cart (<span id="cart-count">0</span>)</a>
        </nav>
    </header>

    <!-- HERO -->
    <section class="hero">
        <h2>New Collection 2026</h2>
        <p>Minimal. Clean. Powerful.</p>
        <button onclick="scrollToProducts()">Shop Now</button>
    </section>

    <!-- PRODUCTS -->
    <section id="products" class="products">
        <h2>Our Products</h2>
        <div class="product-grid">

            <div class="product">
                <img src="https://via.placeholder.com/200">
                <h3>Black Hoodie</h3>
                <p>₱999</p>
                <button onclick="addToCart('Black Hoodie', 999)">Add to Cart</button>
            </div>

            <div class="product">
                <img src="https://via.placeholder.com/200">
                <h3>White Tee</h3>
                <p>₱499</p>
                <button onclick="addToCart('White Tee', 499)">Add to Cart</button>
            </div>

            <div class="product">
                <img src="https://via.placeholder.com/200">
                <h3>Denim Jacket</h3>
                <p>₱1499</p>
                <button onclick="addToCart('Denim Jacket', 1499)">Add to Cart</button>
            </div>

        </div>
    </section>

    <!-- CART -->
    <section id="cart" class="cart">
        <h2>Your Cart</h2>
        <ul id="cart-items"></ul>
        <h3>Total: ₱<span id="total">0</span></h3>
        <button onclick="checkout()">Checkout</button>
    </section>

    <script src="script.js"></script>
</body>
</html>
